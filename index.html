<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@400;700;900&family=Bebas+Neue&family=Outfit:wght@400;700;900&family=Syne:wght@400;700;800&family=Righteous&family=Bungee&family=Anton&family=Unbounded:wght@400;700;900&family=Inter:wght@400;700&family=Cormorant+Garamond:wght@400;700&family=Bodoni+Moda:wght@400;700&family=Cinzel:wght@400;700&family=Philosopher:wght@400;700&family=Tenor+Sans&family=Prata&family=EB+Garamond:wght@400;700&family=Manrope:wght@400;700&family=Space+Grotesk:wght@400;700&family=Bangers&family=Luckiest+Guy&family=Londrina+Solid:wght@300;400;900&family=Titan+One&family=Special+Elite&family=Archivo+Black&family=Press+Start+2P&family=Cinzel+Decorative:wght@400;700;900&family=Abril+Fatface&family=Permanent+Marker&display=swap"
    rel="stylesheet">
  <title>Vevara Editor</title>
</head>

<body>
  <div id="root">
    <!-- Premium pre-render loading screen for 0s blank screen delay (hidden by default) -->
    <div id="pre-react-export-loader" style="
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #f3efff;
      color: #7c4af0;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 24px;
      text-align: center;
      user-select: none;
      z-index: 99999;
    ">
      <div style="max-width: 280px; width: 100%;">
        <h1 style="
          font-size: 36px;
          font-weight: 800;
          letter-spacing: -0.02em;
          margin: 0 0 16px 0;
          color: #7c4af0;
        ">vevara</h1>
        <p style="
          font-size: 14px;
          font-weight: 500;
          color: rgba(124, 74, 240, 0.8);
          margin: 0 0 24px 0;
        ">Loading export workspace...</p>
        <!-- Premium minimal loading bar -->
        <div style="
          height: 2px;
          width: 100%;
          background-color: rgba(124, 74, 240, 0.1);
          border-radius: 999px;
          overflow: hidden;
          position: relative;
        ">
          <div style="
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 40%;
            background-color: #7c4af0;
            border-radius: 999px;
            animation: preloaderAnimation 1.8s ease-in-out infinite;
          "></div>
        </div>
      </div>
      <style>
        @keyframes preloaderAnimation {
          0% { left: -40%; right: 100%; }
          50% { left: 30%; right: 30%; }
          100% { left: 100%; right: -40%; }
        }
      </style>
    </div>
    <script>
      if (window.location.pathname === '/export') {
        var loader = document.getElementById('pre-react-export-loader');
        if (loader) loader.style.display = 'flex';
      }
    </script>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
